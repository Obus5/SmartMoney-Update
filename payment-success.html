<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pembayaran Berhasil</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020f26;
    color:white;
    font-family:Arial,sans-serif;
}

.card{
    text-align:center;
    padding:40px;
    background:#071b3b;
    border-radius:20px;
    width:400px;
    box-shadow:0 0 20px rgba(0,255,136,.2);
}

.icon{
    font-size:70px;
    color:#00d26a;
}

h1{
    margin-top:20px;
}

p{
    color:#c9d3e0;
}

.loader{
    margin-top:20px;
}

</style>
</head>

<body>

<div class="card">

<div class="icon">✓</div>

<h1>Pembayaran Berhasil</h1>

<p>
Sedang mengaktifkan paket premium Anda...
</p>

<div class="loader">
Mohon tunggu beberapa detik
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function cekPembayaran(){

    const orderId =
    localStorage.getItem("order_id");

    const paket =
    localStorage.getItem("selected_plan");

    const userId =
    localStorage.getItem("user_id");

    const response =
    await fetch(
        "http://localhost:3000/check-status",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                order_id:orderId
            })
        }
    );

    const data =
    await response.json();

    if(
        data.transaction_status === "settlement" ||
        data.transaction_status === "capture"
    ){

        let expiredDate = new Date();

if (paket === "basic") {
    expiredDate.setDate(expiredDate.getDate() + 1);
}

if (paket === "weekly") {
    expiredDate.setDate(expiredDate.getDate() + 7);
}

if (paket === "premium") {
    expiredDate.setDate(expiredDate.getDate() + 30);
}

let amount = 0;

if (paket === "basic") amount = 5000;
if (paket === "weekly") amount = 25000;
if (paket === "premium") amount = 100000;

const { data: updateData, error } =
await supabaseClient
.from("subscribers")
.update({
    status: "active",
    package_name: paket,
    payment_date: new Date(),
    expired_date: expiredDate,
    amount: amount,
    payment_method: data.payment_type
})
.eq("id", userId);

console.log("UPDATE RESULT:", updateData);
console.log("UPDATE ERROR:", error);

setTimeout(()=>{
    window.location.href =
    "dashboard.html";
},2000);

}

}

cekPembayaran();

</script>

</body>
</html>
